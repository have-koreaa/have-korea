        /* =========================================
           دیزاینی تایبەتی کاردەکان (Moving Border)
           ========================================= */
        .card {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--card-radius);
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: all 0.4s ease;
            /* بۆ ئەوەی بۆردەرە جوڵاوەکە لە دەرەوە دەرنەچێت */
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; /* بۆ ڕێکخستنی ناوەڕۆک */
            justify-content: center;
            align-items: center;
        }

        /* دروستکردنی بۆردەری جوڵاوی مۆر */
        .card::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #8c00ff);
            animation: border-spin 4s linear infinite;
            z-index: -2;
        }

        /* دروستکردنی بەشی ناوەوەی کاردەکە کە وێنەکەی تێدایە */
        .card::after {
            content: '';
            position: absolute;
            inset: 3px; /* ئەستووری بۆردەرەکە */
            background: var(--bg-card);
            border-radius: calc(var(--card-radius) - 3px);
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(140, 0, 255, 0.3);
        }
        
        /* خێراکردنی جوڵەی بۆردەر کاتێک ماوس دەچێتە سەری */
        .card:hover::before {
            animation-duration: 1.5s;
            background: conic-gradient(transparent, transparent, #00d2ff, #8c00ff); /* ڕەنگی زیاتر */
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: calc(var(--card-radius) - 3px); /* ڕێکخستن لەگەڵ بۆردەر */
            transition: 0.5s;
            z-index: 1; /* هاتنە سەرەوە */
            display: block;
            position: absolute;
            inset: 3px; /* پڕکردنەوەی ناو چوارچێوەکە */
        }

        .card:hover .card-img {
            filter: brightness(0.4); /* تۆخکردنی وێنە زیاتر بۆ دەرکەوتنی نووسینەکان */
        }

        .card-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(140, 0, 255, 0.8);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(140, 0, 255, 0.5);
            z-index: 10;
        }

        /* دیزاینی نوێ بۆ بەشی نووسینی سەر کاردەکان */
.card-overlay {
    position: absolute;
    bottom: 0; 
    left: 0; 
    right: 0;
    /* سێبەرێکی نەرم بۆ ژێر ناوەکە */
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    padding: 20px 15px;
    
    /* گۆڕینی ئەم بەهایە وادەکات ناوەکە بێتە سەرەوەتر لە دەرەوە */
    transform: translateY(100%); 
    
    opacity: 1;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s;
    z-index: 5;
    border-bottom-left-radius: calc(var(--card-radius) - 3px);
    border-bottom-right-radius: calc(var(--card-radius) - 3px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

/* کاتێک ماوس دەچێتە سەر کاردەکە */

.back-btn::after {
    display: none;
}

.back-btn:hover {
    background: rgba(140, 0, 255, 0.15);
    border-top-color: rgba(200, 140, 255, 1);
    border-left-color: rgba(160, 50, 255, 0.85);
    border-right-color: rgba(160, 50, 255, 0.85);
    border-bottom-color: rgba(120, 0, 220, 0.55);

        0 8px 30px rgba(140, 0, 255, 0.35),
        0 0 0 1px rgba(140, 0, 255, 0.2),
        inset 0 1px 0 rgba(210, 160, 255, 0.6),
        inset 0 -1px 0 rgba(100, 0, 200, 0.4);
    transform: translateY(-2px);
}

.back-btn:active {
    transform: translateY(0);
    background: rgba(140, 0, 255, 0.2);
}

@media (max-width: 768px) {

        padding: 12px 28px;

/* لایەری دووەم - باگراوندی ناوەوە */
.back-btn::after {
    content: '';
    position: absolute;
    inset: 2px;
    background: linear-gradient(135deg, rgba(20, 20, 30, 0.95), rgba(30, 15, 45, 0.9));
    border-radius: 48px;
    z-index: -1;
}

/* ئەنیمەیشنی سوڕانەوە */
@keyframes rotateBorder {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* کاتی Hover - خێراکردنی جوڵەکە و گۆڕانی ڕەنگ */
.back-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 35px rgba(140, 0, 255, 0.4);
}

.back-btn:hover::before {
    animation-duration: 1.5s;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        #00d2ff 90deg,
        #8c00ff 180deg,
        #ff00ff 270deg,
        transparent 360deg
    );
}

/* درەوشانەوەی ئایکۆنەکە */
.back-btn:hover i {
    animation: arrowBounce 0.6s ease-in-out;
}

@keyframes arrowBounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(5px); }
}

/* کاتی کلیک کردن */
.back-btn:active {
    transform: translateY(-1px) scale(0.98);
    box-shadow: 0 5px 15px rgba(140, 0, 255, 0.3);
}

            renderEpisodes: function() {
                const listContainer = document.getElementById('episode-list');
                listContainer.innerHTML = '';
                
                const episodes = this.currentMovie.episodes;
                
                episodes.forEach((ep, index) => {
                    const btn = document.createElement('button');
                    btn.className = `action-btn ${index === 0 ? 'active' : ''}`;
                    btn.innerHTML = ep.name ? ep.name : `ئەلقەی ${ep.ep}`;
                    btn.onclick = () => {
                        this.playEpisode(index, 0); 
                        document.querySelectorAll('#episode-list .action-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                    };
                    listContainer.appendChild(btn);
                });
            },

            playEpisode: function(epIndex, serverIndex) {
                this.currentEpisodeIndex = epIndex;
                const episode = this.currentMovie.episodes[epIndex];
                
                const serverContainer = document.getElementById('server-list');
                serverContainer.innerHTML = '';

                if(episode.servers && episode.servers.length > 0) {
                    episode.servers.forEach((srv, idx) => {
                        const btn = document.createElement('button');
                        btn.className = `action-btn ${idx === serverIndex ? 'active' : ''}`;
                        btn.innerHTML = `<i class="fas fa-server"></i> ${srv.name}`;
                        
                        btn.onclick = () => {
                            document.getElementById('video-frame').src = srv.link;
                            document.querySelectorAll('#server-list .action-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        };
                        serverContainer.appendChild(btn);
                    });

                    document.getElementById('video-frame').src = episode.servers[serverIndex].link;
                } else {
                    document.getElementById('video-frame').src = "";
                    serverContainer.innerHTML = '<span style="color:red">هیچ سێرڤەرێک نییە</span>';
                }

           search: function(query) {
    let filtered = this.data;
    
    // یەکەم: فلتەر بەپێی جۆری هەڵبژاردراو (دراما، فیلم، یان هەموویان)
    if (this.currentFilter && this.currentFilter !== 'all') {
        filtered = filtered.filter(i => i.type === this.currentFilter);
    }
    
    // دووەم: فلتەر بەپێی ناوی گەڕاو
    if (query) {
        filtered = filtered.filter(i => i.title.toLowerCase().includes(query.toLowerCase()));
    }
    
    this.renderGrid(filtered);
    if(document.getElementById('player-modal').style.display === 'block') this.goHome();
},
filter: function(type, btnElement) {
    // تۆماری جۆری هەڵبژاردراو
    this.currentFilter = type;
    
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');

    const filterNav = document.getElementById('filter-navbar');
    
    // فلتەری ژانر و ساڵ تەنها بۆ دراما، فیلم، و چینی نیشان بدە
    if (type === 'drama' || type === 'movie' || type === 'chinese' || type === 'japanese') {
        filterNav.style.display = 'flex';
    } else {
        filterNav.style.display = 'none';
    }

    let filtered;
    if(type === 'all') {
        filtered = this.data;
    } else {
        filtered = this.data.filter(i => i.type === type);
    }
    
    filtered.sort((a, b) => b.id - a.id);
    this.renderGrid(filtered);

    // گۆڕینەوەی سەردێڕی بەش
    const sectionHeader = document.querySelector('.section-header');
    
    // ✅ فووتەر: تەنها لە هەمووی پیشان دەدرێت، هێلین-کێڵوا شارەوە دەبێت لە ناڤبارەکانی تر
    const helinFooter = document.querySelector('.helin-footer');
    if (helinFooter) {
        if (type === 'all') {
            helinFooter.classList.remove('hide-credits');
        } else {
            helinFooter.classList.add('hide-credits');
        }
    }

    if (type === 'all') {
        sectionHeader.innerHTML = `
            <i class="fas fa-bolt"></i>
            <span>نوێترین زیادکراوەکان</span>
        `;
    } else if (type === 'drama') {
        sectionHeader.innerHTML = `
            <i class="fas fa-tv"></i>
            <span>دراما</span>
        `;
    } else if (type === 'movie') {
        sectionHeader.innerHTML = `
            <i class="fas fa-film"></i>
            <span>فیلم</span>
        `;
   } else if (type === 'chinese') {
    sectionHeader.innerHTML = `
        <i class="fas fa-dragon"></i>
        <span>چینی</span>
    `;
} else if (type === 'japanese') {
    sectionHeader.innerHTML = `
        <i class="fas fa-sun"></i>
        <span>ژاپۆنی</span>
    `;
}

    if(document.getElementById('player-modal').style.display === 'block') this.goHome();
},
showPersonWorks: function(role, personName) {
    function getPersonAvatar(works, role, personName) {
        if (role === 'translator') {
            for (let work of works) {
                if (work.translators) {
                    const found = work.translators.find(t => t.name === personName);
                    if (found) return found.avatar;
                }
            }
        } else if (role === 'technician') {
            for (let work of works) {
                if (work.technician && work.technician.name === personName)
                    return work.technician.avatar;
            }
        } else if (role === 'poster_designer') {
            for (let work of works) {
                if (work.poster_designer && work.poster_designer.name === personName)
                    return work.poster_designer.avatar;
            }
        }
        return 'admin1.png';
    }

    const works = this.data.filter(item => {
        if (role === 'translator') {
            return item.translators && item.translators.some(t => t.name === personName);
        } else if (role === 'technician') {
            return item.technician && item.technician.name === personName;
        } else if (role === 'poster_designer') {

    const roleMap = {

function toggleFilterMenu() {

}
async function applyFilters() {
    const genreCheckboxes = document.querySelectorAll('.filter-options input[type="checkbox"]');
    const selectedGenres = [];
    const selectedYears = [];
    const ratingFilters = [];

    genreCheckboxes.forEach(checkbox => {
        if (checkbox.checked) {
            const value = checkbox.value;
            if (!isNaN(value)) {
                selectedYears.push(value);
            } else if (value.startsWith('imdb_')) {
                ratingFilters.push({ type: 'imdb', min: parseFloat(value.split('_')[1]) });
            } else if (value.startsWith('tmdb_')) {
                ratingFilters.push({ type: 'tmdb', min: parseFloat(value.split('_')[1]) });
            } else {
                selectedGenres.push(value);
            }
        }
    });

    
    let currentType = app.currentFilter || 'all';
    if (selectedGenres.length === 0 && selectedYears.length === 0 && ratingFilters.length === 0) {
    let filtered = currentType === 'all' ? app.data : app.data.filter(item => item.type === currentType);
    app.renderGrid(filtered);
    toggleFilterMenu();
    return;
}
    
    // دەستپێکردن لە هەموو داتاکان
    let filtered = app.data;
    
    // **یەکەم:** فلتەر بکە بەپێی جۆر (دراما یان فیلم)
    if (currentType !== 'all') {
        filtered = filtered.filter(item => item.type === currentType);
    }
    
    // **دووەم:** فلتەر بکە بەپێی ژانەر (ئەگەر هەڵبژێردراوە)
    if (selectedGenres.length > 0) {
        filtered = filtered.filter(item => {
            return selectedGenres.some(genre => item.genre && item.genre.includes(genre));
        });
    }
    
    // **سێیەم:** فلتەر بکە بەپێی ساڵ (ئەگەر هەڵبژێردراوە)
    if (selectedYears.length > 0) {
        filtered = filtered.filter(item => {
            return selectedYears.some(year => item.title.includes(year));
        });
    }
    
    
 if (ratingFilters.length > 0) {
    await Promise.all(app.data.map(item =>
        app.fetchIMDB(item.title).then(({imdb, tmdb}) => {
            item._imdb = imdb;
            item._tmdb = tmdb;
        })
    ));

    filtered = filtered.filter(item => {
        if (!item._imdb && !item._tmdb) return false;

        return ratingFilters.some(f => {
            if (f.type === 'imdb') {
                if (!item._imdb) return false;
                return parseFloat(item._imdb) >= f.min;
            }
            if (f.type === 'tmdb') {
                if (!item._tmdb) return false;
                return parseFloat(item._tmdb) >= f.min;
            }
            return false;
        });
    });
}

    app.renderGrid(filtered);
    toggleFilterMenu();
}

function clearFilters() {
    const checkboxes = document.querySelectorAll('.filter-options input[type="checkbox"]');
   checkboxes.forEach(cb => cb.checked = false);
    
    let currentType = app.currentFilter || 'all';
    // فلتەرکردن بەپێی جۆرەکە
    let filtered;
    if (currentType === 'all') {
        filtered = app.data;
    } else {
        filtered = app.data.filter(item => item.type === currentType);
    }
    
    app.renderGrid(filtered);
    toggleFilterMenu();
}
function toggleFilterSection(section) {
    const genreSection = document.getElementById('genre-section');
    const yearSection = document.getElementById('year-section');
    const ratingSection = document.getElementById('rating-section');
    const genreBtn = document.querySelector('.filter-main-btn:nth-child(1)');
    const yearBtn = document.querySelector('.filter-main-btn:nth-child(2)');
    const ratingBtn = document.querySelector('.filter-main-btn:nth-child(3)');
    
    if (section === 'genre') {
        if (genreSection.style.display === 'none') {
            genreSection.style.display = 'block';
            genreBtn.classList.add('active');
        } else {
            genreSection.style.display = 'none';
            genreBtn.classList.remove('active');
        }
    } else if (section === 'year') {
        if (yearSection.style.display === 'none') {
            yearSection.style.display = 'block';
            yearBtn.classList.add('active');
        } else {
            yearSection.style.display = 'none';
            yearBtn.classList.remove('active');
        }
    } else if (section === 'rating') {
        if (ratingSection.style.display === 'none') {
            ratingSection.style.display = 'block';
            ratingBtn.classList.add('active');
        } else {
            ratingSection.style.display = 'none';
            ratingBtn.classList.remove('active');
        }
    }
}

function toggleColorPicker(e) {
    e.stopPropagation();
    const panel = document.getElementById('colorPickerPanel');
    panel.classList.toggle('show');
    if (panel.classList.contains('show')) {
        setTimeout(() => {
            document.addEventListener('click', closePanelOutside);
        }, 10);
    }
}

function closePanelOutside(e) {
    if (!e.target.closest('#colorPickerPanel') && !e.target.closest('.color-picker-btn')) {
        document.getElementById('colorPickerPanel').classList.remove('show');
        document.removeEventListener('click', closePanelOutside);
    }
}

let currentRandomType = 'all';

function setRandomType(btn) {
    const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#8c00ff';
    const al = getComputedStyle(document.documentElement).getPropertyValue('--accent-light').trim() || '#b366ff';
    
    function hexToRgba(hex, alpha) {
        hex = hex.replace('#','').trim();
        if(hex.length===3) hex=hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        const r=parseInt(hex.substring(0,2),16), g=parseInt(hex.substring(2,4),16), b=parseInt(hex.substring(4,6),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    // ڕیسێتی هەموو دوگمەکان
    document.querySelectorAll('.random-type-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = 'rgba(255,255,255,0.04)';
        b.style.borderColor = 'rgba(255,255,255,0.12)';
        b.style.color = 'rgba(255,255,255,0.7)';
    });

    // ئەکتیڤکردنی دوگمەی هەڵبژێردراو
    btn.classList.add('active');
    btn.style.background = hexToRgba(ac, 0.15);
    btn.style.borderColor = hexToRgba(ac, 0.5);
    btn.style.color = '#fff';

    currentRandomType = btn.dataset.type;
    if (currentRandomItem) pickRandom();
}

function pickRandom() {
    let pool = app.data;
    if (currentRandomType !== 'all') {
        pool = app.data.filter(d => d.type === currentRandomType);
    }
    if (pool.length === 0) return;

    // دڵنیابوون لەوەی دووبارە هەمان شت نەدەرکەوێت
    let item;
    do {
        item = pool[Math.floor(Math.random() * pool.length)];
    } while (pool.length > 1 && currentRandomItem && item.id === currentRandomItem.id);

    currentRandomItem = item;

    // تایپی نمایش
    const typeMap = { drama: 'دراما', movie: 'فیلم', chinese: 'چینی' };

    document.getElementById('random-img').src = item.image;
    document.getElementById('random-title').innerText = item.title;
    document.getElementById('random-genre').innerText = item.genre || '';
    document.getElementById('random-desc').innerText = item.desc || '';
    document.getElementById('random-type-badge').innerText = typeMap[item.type] || item.type;

    const card = document.getElementById('random-result-card');
    card.style.display = 'flex';
    card.style.animation = 'none';
    // ڕیستارتی ئەنیمەیشن
    void card.offsetWidth;
    card.style.animation = 'fadeSlideIn 0.4s ease';

    document.getElementById('random-watch-btn').style.display = 'block';
}

function watchRandom() {
    if (!currentRandomItem) return;
    closeMenuModal();
    // داخستنی سایدبار
    document.getElementById('modern-sidebar').classList.remove('active');
    document.getElementById('sidebar-trigger').classList.remove('active');
    // کردنەوەی پلەیەر
    setTimeout(() => app.openPlayer(currentRandomItem), 150);
}



function quickRandom(type) {
    currentRandomType = type;
    currentRandomItem = null;

    let pool = app.data;
    if (type !== 'all') pool = app.data.filter(d => d.type === type);
    if (pool.length === 0) return;

    const item = pool[Math.floor(Math.random() * pool.length)];
    currentRandomItem = item;

    document.getElementById('modern-sidebar').classList.remove('active');
    document.getElementById('sidebar-trigger').classList.remove('active');

    app.openPlayer(item);
}


const OMDB_KEY = '87e20d0a';
const TMDB_KEY = '1e5953c4d635318acd9b1cb9c7010caa';

const ratingCache = {};

app.fetchIMDB = async function(title) {
    if (ratingCache[title]) return ratingCache[title];
    try {
        const clean = title.replace(/\d{4}/g, '').replace(/[^a-zA-Z0-9\s]/g, '').trim();
        const year = title.match(/\d{4}/)?.[0] || '';
        const [omdbRes, tmdbRes] = await Promise.allSettled([
            fetch(`https://www.omdbapi.com/?t=${encodeURIComponent(clean)}&apikey=${OMDB_KEY}`).then(r => r.json()),
            fetch(`https://api.themoviedb.org/3/search/multi?api_key=${TMDB_KEY}&query=${encodeURIComponent(clean)}${year ? '&year='+year : ''}&language=en-US`).then(r => r.json())
        ]);
        const imdb = (omdbRes.status === 'fulfilled' && omdbRes.value?.imdbRating && omdbRes.value.imdbRating !== 'N/A')
            ? omdbRes.value.imdbRating : null;
        let tmdb = null;
        if (tmdbRes.status === 'fulfilled' && tmdbRes.value?.results?.length) {
            const first = tmdbRes.value.results[0];
            tmdb = first.vote_average ? (Math.round(first.vote_average * 10) / 10).toFixed(1) : null;
        }
        const result = { imdb, tmdb };
        ratingCache[title] = result;
        return result;
    } catch(e) { return { imdb: null, tmdb: null }; }
};

}

        document.getElementById('searchBarDrop').classList.remove('open');
        const inp = document.getElementById('searchInput');
        inp.value = '';

    }
});

/* --- ژانەر: گریدی ئایکۆندار --- */
.filter-options {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
}

.filter-options label {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    color: rgba(255,255,255,0.65);

    font-weight: 700;
    font-family: 'Noto Kufi Arabic', Tahoma, sans-serif;
    cursor: pointer;
    padding: 8px 4px;
    border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.07);
    transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
    text-align: center;
    overflow: hidden;
    user-select: none;
}

.filter-options label::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(140,0,255,0.18), rgba(179,102,255,0.1));
    opacity: 0;
    transition: opacity 0.25s;
    border-radius: 13px;
}

.filter-options label:hover::before { opacity: 1; }

.filter-options label:hover {
    border-color: rgba(140,0,255,0.45);
    color: #fff;
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(140,0,255,0.15);
}

/* ئایکۆنی ژانەر */
.filter-options label::after {
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    font-size: 13px;
    opacity: 0.7;
    order: -1;
    color: var(--accent-light);
    transition: all 0.25s;
}

/* ئایکۆنی هەر ژانەرێک */
.filter-options label[data-genre="ڕۆمانسی"]::after  { content: '\f004'; }
.filter-options label[data-genre="ئەکشن"]::after      { content: '\f135'; }
.filter-options label[data-genre="کۆمیدی"]::after     { content: '\f118'; }
.filter-options label[data-genre="تاوانکاری"]::after  { content: '\f505'; }
.filter-options label[data-genre="خەیاڵی"]::after     { content: '\f7e4'; }
.filter-options label[data-genre="دراما"]::after      { content: '\f008'; }
.filter-options label[data-genre="هەستبزوێن"]::after  { content: '\f570'; }
.filter-options label[data-genre="پزیشکی"]::after     { content: '\f0f1'; }
.filter-options label[data-genre="سەرکێشی"]::after    { content: '\f06d'; }

/* چێکباکسی شاراوە */
.filter-options input[type="checkbox"] {
    position: absolute;
    opacity: 0;
    width: 0;
    height: 0;
    pointer-events: none;
}

/* کاتی هەڵبژاردن */
.filter-options label:has(input:checked) {
    background: rgba(140,0,255,0.18);
    border-color: rgba(179,102,255,0.7);
    color: #fff;
    box-shadow: 0 0 18px rgba(140,0,255,0.25),
                inset 0 1px 0 rgba(255,255,255,0.08);
    transform: translateY(-2px);
}

.filter-options label:has(input:checked)::before { opacity: 1; }

.filter-options label:has(input:checked)::after {
    opacity: 1;
    color: #fff;
    filter: drop-shadow(0 0 6px rgba(179,102,255,0.8));
}

/* نیشانەی تیک */
.filter-options label:has(input:checked) .check-dot {
    display: flex;
}

.check-dot {
    display: none;
    position: absolute;
    top: 4px;
    left: 4px;
    width: 12px;
    height: 12px;

volunteer: (() => {

        if (input.files && input.files[0]) {

                const data = JSON.parse(localStorage.getItem('userAccount'));

 }

    const g = parseInt(hex.substring(2,4),16);
    const b = parseInt(hex.substring(4,6),16);

    ['translator','technician','poster_designer'].forEach(t => {

        activeBtn.style.color = '#fff';

function filterWorksModal(btn) {
    const ac = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#8c00ff';
    
    function hexToRgba(hex, alpha) {
        hex = hex.replace('#','').trim();
        if(hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
        const r = parseInt(hex.substring(0,2),16);
        const g = parseInt(hex.substring(2,4),16);
        const b = parseInt(hex.substring(4,6),16);
        return `rgba(${r},${g},${b},${alpha})`;
    }

    document.querySelectorAll('.works-person-btn').forEach(b => {
        b.classList.remove('active');
        b.style.background = 'rgba(255,255,255,0.04)';
        b.style.borderColor = 'rgba(255,255,255,0.12)';
        b.style.color = 'rgba(255,255,255,0.7)';
        const badge = b.querySelector('.works-count-badge');
        if(badge) badge.style.background = 'rgba(255,255,255,0.15)';
        const img = b.querySelector('img');
        if(img) img.style.borderColor = 'rgba(255,255,255,0.3)';
    });

    btn.classList.add('active');
    btn.style.background = hexToRgba(ac, 0.15);
    btn.style.borderColor = hexToRgba(ac, 0.5);
    btn.style.color = '#fff';
    const activeBadge = btn.querySelector('.works-count-badge');
    if(activeBadge) activeBadge.style.background = hexToRgba(ac, 0.45);
    const activeImg = btn.querySelector('img');
    if(activeImg) activeImg.style.borderColor = hexToRgba(ac, 0.7);

    const role = btn.dataset.role;
    const name = btn.dataset.name;
    const works = app.data.filter(item => {
        if (role === 'translator') {
            return item.translators && item.translators.some(t => t.name === name);
        } else if (role === 'technician') {
            return item.technician && item.technician.name === name;
        } else if (role === 'poster_designer') {
            return item.poster_designer && item.poster_designer.name === name;
        }
        return false;
    });

    document.querySelectorAll('.works-person-btn').forEach(b => {
        const bRole = b.dataset.role;
        const bName = b.dataset.name;
        const count = app.data.filter(item => {
            if (bRole === 'translator') return item.translators && item.translators.some(t => t.name === bName);
            if (bRole === 'technician') return item.technician && item.technician.name === bName;
            if (bRole === 'poster_designer') return item.poster_designer && item.poster_designer.name === bName;
            return false;
        }).length;
        const badge = b.querySelector('.works-count-badge');
        if (badge) badge.innerText = count;
    });

    const grid = document.getElementById('works-modal-grid');
    if (!grid) return;

    if (works.length === 0) {
        grid.innerHTML = '<p style="color:#777;text-align:center;width:100%;padding:20px 0;">هیچ کارێک نەدۆزرایەوە</p>';
        return;
    }
grid.innerHTML = works.map(work => `
    <div class="work-card" onclick="app.openPlayer(app.data.find(d => d.id === ${work.id})); closeMenuModal(); document.getElementById('modern-sidebar').classList.remove('active'); document.getElementById('sidebar-trigger').classList.remove('active');">
        <div class="work-card-img-wrap">
            <img src="${work.image}" alt="${work.title}" loading="lazy">
            <div class="work-ep-count">${work.type === 'movie' ? 'فیلم' : work.episodes ? work.episodes.length + ' ئەڵقە' : ''}</div>
            <div class="work-card-play">
                <div style="width:42px;height:42px;background:rgba(140,0,255,0.9);border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 0 20px rgba(140,0,255,0.6);">
                    <i class="fas fa-play" style="color:#fff;font-size:14px;margin-right:-2px;"></i>
                </div>
            </div>
        </div>
<div class="work-title" style="font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;">${work.title}</div>    </div>
`).join('');
}

<style>
/* --- چاکسازی گشتی بۆ هەموو ئامێرێک --- */
.rating-wrapper *, .rating-wrapper *::before, .rating-wrapper *::after {
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent; /* لابردنی ڕەنگی شین لەکاتی کلیک لە ئەندرۆید */
}

/* کۆنتەینەری سەرەکی */
.rating-wrapper {
    position: relative;
    
    /* ڕێکخستنی قەبارە و جێگا */
    max-width: 100%;
    width: 100%;
    margin: 30px auto;
    padding: 30px 20px;
    
    /* گرنگە بۆ ئەوەی جوڵەکە لە دەرەوەی بازنەکە دەرنەچێت */
    border-radius: 24px;
    overflow: hidden; 
    
    /* لابردنی بۆردەری کۆن چونکە ئێستا جوڵەکە دەبێتە بۆردەر */
    /* border: 1px solid ... (This is removed/replaced by the animation) */
    
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
                
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    
    /* دڵنیابوونەوە لەوەی نووسینەکان دەکەونە سەرەوە */
    z-index: 1; 
}

.rating-wrapper::before {
    display: none;
}

/* ::after - بەرپرسیارە لە دروستکردنی باگراوندە جێگیرەکە */
.rating-wrapper::after {
    content: '';
    position: absolute;
    
    /* ئەم بەشە ئەستووری بۆردەرەکە دیاری دەکات */
    /* ژمارەکە گەورەتر بێت، هێڵە جوڵاوەکە باریکتر دەبێت */
    inset: 2px;

    background: linear-gradient(145deg, rgba(15, 5, 30, 0.98), rgba(25, 10, 45, 0.95));
    
    border-radius: 22px; /* کەمێک کەمتر لە هی باوکەکە بۆ ئەوەی جوان بێت */
    z-index: -1; /* لە سەرووی جوڵەکەوەیە بەڵام لە ژێر نووسینەکە */
}

    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 
                 0 0 40px rgba(255, 215, 0, 0.3);
    
    /* جوڵەی لێدانی دڵ بۆ ئەستێرە دیاریکراوەکان */
    animation: starPulse 2s infinite alternate; 
}

.selection-hint {
    color: #a8a8cf;
    font-size: 15px;
    font-weight: 600;
    min-height: 24px;
    margin-top: 15px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    transition: color 0.3s ease;
}

.selection-hint.active {
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

/* --- ئەنیمەیشنەکان (Keyframes) --- */

/* جوڵەی ڕووناکی باگراوند */
@keyframes rotateGlow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* جوڵەی مەلەکردن (Floating) - ئەستێرەکان دێن و دەچن */
@keyframes floatingStars {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); } /* ٦ پیکسڵ دەچێتە سەرەوە */
}

/* جوڵەی ترپە (Pulse) بۆ ئەستێرە ئەکتیڤەکان */
@keyframes starPulse {
    0% { transform: scale(1.15) translateY(-5px); text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
    100% { transform: scale(1.25) translateY(-5px); text-shadow: 0 0 35px rgba(255, 215, 0, 0.9); }
}

/* میدیا کوێری بۆ مۆبایل */
@media (max-width: 480px) {
    .star {
        font-size: 38px; /* کەمێک بچووکتر بۆ مۆبایل */
    }
    .rating-stars-section {
        padding: 20px 10px;
    }
}

/* دوگمەی ناردن - دیزاینی مۆری جوڵاو (با) */
.submit-rating-btn {
    -webkit-appearance: none; /* زۆر گرنگە بۆ ئەندرۆید */
    appearance: none;
    width: 100%;
    
   background: linear-gradient(135deg, #6b00cc, #8c00ff);



    color: white;
    border: none;
    padding: 15px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    position: relative;
    z-index: 2;
    outline: none;
    cursor: pointer;
    
    /* جوڵەی باگراوند و سێبەر بەیەکەوە */
box-shadow: 0 8px 20px rgba(91, 0, 196, 0.4),
            4px 0 15px rgba(140, 0, 255, 0.3),
            -4px 0 15px rgba(140, 0, 255, 0.3);
    transition: transform 0.2s;
}



.submit-rating-btn:active {
    transform: scale(0.96);
    /* کاتێک دەست دەنێیت کەمێک سێبەرەکە کەم دەکاتەوە */
    box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4); 
}

.submit-rating-btn:disabled {
    background: #3e3e4e;
    color: #aaa;
    box-shadow: none;
    opacity: 0.7;
    cursor: not-allowed;
    animation: none; /* جوڵەی نامێنێت ئەگەر ئیش نەکات */
}

/* بەشی ئەنجامەکان */
.rating-results {
    display: flex;
    flex-direction: row;
    gap: 15px;
    margin-top: 30px;
    z-index: 2;
    position: relative;
}

.result-card {
    flex: 1;
    background: rgba(255, 255, 255, 0.03);
    padding: 15px 10px;
    border-radius: 14px;
    text-align: center;
    border: 1px solid rgba(140, 0, 255, 0.1);
}

.result-label {
    color: #b366ff;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 5px;
}

.result-value {
    color: #fff;
    font-size: 24px;
    font-weight: 900;
}

/* پەیامەکان */
.rating-message {
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
    font-weight: bold;
}

.rating-message.success {
    background: rgba(46, 204, 113, 0.15);
    color: #2ecc71;
    border: 1px solid rgba(46, 204, 113, 0.3);
}

.rating-message.error {
    background: rgba(231, 76, 60, 0.15);
    color: #e74c3c;
    border: 1px solid rgba(231, 76, 60, 0.3);
}

/* ڕێکخستن بۆ مۆبایلی زۆر بچوک */
@media (max-width: 380px) {
    .rating-wrapper { padding: 20px 15px; }
    .star { font-size: 36px; gap: 8px; }
    .rating-main-title { font-size: 18px; }
}
</style>

<script>
// سکریپتەکە وەک خۆی، تەنها کەمێک چاکسازیم تێدا کرد بۆ خێرایی
const RATING_API_URL = 'https://script.google.com/macros/s/AKfycbyGN4f965k_b3zSkK1D7FivI4VZ-9QrqU7ETjC3a6NPKYtXa3xeiHB13gNfeOAefXUK/exec';

async function getUserIP() {
    const saved = localStorage.getItem('user_unique_id');
    if (saved) return saved;
    const tempID = `user_${Math.random().toString(36).substr(2, 15)}`;
    localStorage.setItem('user_unique_id', tempID);
    // هەوڵی هێنان لە باکگراوند
    fetch('https://api.ipify.org?format=json').then(res => res.json()).then(data => localStorage.setItem('user_unique_id', data.ip)).catch(()=>{});
    return tempID;
}

const originalOpenPlayer = app.openPlayer;
app.openPlayer = async function(item) {
    await originalOpenPlayer.call(this, item);
    setTimeout(() => this.renderRatingSection(item), 100); // دواخستنێکی زۆر کەم بۆ دڵنیابوون لە ڕێندەر
};

app.renderRatingSection = async function(item) {
    const oldSection = document.querySelector('.rating-wrapper');
    if (oldSection) oldSection.remove();
    
    const serverContainer = document.getElementById('server-list').parentElement;
    const hasVoted = localStorage.getItem(`voted_${item.id}`) === 'true';
    const userRating = localStorage.getItem(`user_rating_${item.id}`) || '؟';

    let html = `
        <div class="rating-wrapper fade-in">
            <div class="rating-header">
                <div class="rating-main-title">
                    <i class="fas fa-award"></i>
                    نمرە بدە بەم ${item.type === 'drama' ? 'دراما' : 'فیلمە'}
                </div>
                <div class="rating-subtitle">
                    ${hasVoted ? 'سوپاس بۆ بەشداریکردنت!' : 'پێشبینی خۆت تۆمار بکە'}
                </div>
            </div>
            
           <div class="rating-stars-section">
    <div class="stars-container" id="stars-${item.id}">
        ${[1,2,3,4,5].map(n => `
            <span class="star ${hasVoted ? 'disabled' : ''}" data-rating="${n}">
                <svg viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
            </span>
        `).join('')}
    </div>
    <div class="selection-hint" id="hint-${item.id}">
        ${hasVoted ? 'نمرەی تۆ: ' + userRating : 'ئەستێرەیەک هەڵبژێرە'}
    </div>
</div>
            
            <button class="submit-rating-btn" id="submit-rating-${item.id}" ${hasVoted ? 'disabled' : ''}>
                ${hasVoted ? '✓ نمرەکەت گەیشت' : 'ناردنی نمرە'}
            </button>
            
            <div id="rating-message-${item.id}" class="rating-message"></div>
            
            <div class="rating-results">
                <div class="result-card">
                    <div class="result-label">تێکڕا</div>
                    <div class="result-value rating-average" id="avg-${item.id}">-.-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">دەنگەکان</div>
                    <div class="result-value" id="votes-${item.id}">0</div>
                </div>
            </div>
        </div>
    `;
    
    serverContainer.insertAdjacentHTML('afterend', html);
    this.setupRatingEvents(item, hasVoted);
    this.fetchLiveRatings(item.id);
};

app.fetchLiveRatings = async function(movieId) {
    try {
        const response = await fetch(`${RATING_API_URL}?movie_id=${movieId}`);
        const data = await response.json();
        const avgEl = document.getElementById(`avg-${movieId}`);
        const votesEl = document.getElementById(`votes-${movieId}`);
        if (avgEl) avgEl.innerText = data.average || '0.0';
        if (votesEl) votesEl.innerHTML = `<i class="fas fa-user-friends"></i> ${data.total_votes || 0}`;
    } catch (error) { console.log("Error fetching ratings"); }
};

app.setupRatingEvents = function(item, hasVoted) {
    let selectedRating = 0;
    const stars = document.querySelectorAll(`#stars-${item.id} .star`);
    const hint = document.getElementById(`hint-${item.id}`);
    const submitBtn = document.getElementById(`submit-rating-${item.id}`);
    const messageDiv = document.getElementById(`rating-message-${item.id}`);

    const ratingTexts = { 1: 'خراپ 😞', 2: 'مامناوەند 😐', 3: 'باش 🙂', 4: 'زۆر باش 😊', 5: 'نایاب! 🤩' };

    stars.forEach(star => {
        // بەکارهێنانی 'click' بۆ مۆبایل باشترە لە hover
        star.addEventListener('click', function() {
            if (hasVoted) return;
            selectedRating = parseInt(this.dataset.rating);
            
            // لابردنی کلاسەکان و زیادکردنەوەیان
            stars.forEach(s => {
                const sVal = parseInt(s.dataset.rating);
                if (sVal <= selectedRating) {
                    s.classList.add('active');
                    s.style.color = '#ffd700';
                } else {
                    s.classList.remove('active');
                    s.style.color = '#3a3a50';
                }
            });
            
            hint.innerText = ratingTexts[selectedRating];
            hint.classList.add('active');
        });
    });

    submitBtn.addEventListener('click', async function() {
        if (hasVoted || selectedRating === 0) {
            if(selectedRating === 0) {
                hint.style.color = '#e74c3c';
                setTimeout(() => hint.style.color = '#9b59b6', 1000);
            }
            return;
        }

        this.disabled = true;
        this.innerText = 'چاوەڕوانبە...';

        try {
            const userIP = await getUserIP();
            const res = await fetch(RATING_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ movie_id: item.id, user_ip: userIP, rating: selectedRating })
            });

            const result = await res.json();
            if (result.status === 'success' || result.status === 'already_voted') {
                localStorage.setItem(`voted_${item.id}`, 'true');
                localStorage.setItem(`user_rating_${item.id}`, selectedRating);
                
                this.innerText = '✓ نمرەکەت گەیشت';
                messageDiv.className = 'rating-message success';
                messageDiv.innerText = 'سوپاس! دەنگەکەت بە سەرکەوتوویی تۆمارکرا.';
                messageDiv.style.display = 'block';
                
                document.getElementById(`avg-${item.id}`).innerText = result.average;
                document.getElementById(`votes-${item.id}`).innerHTML = `<i class="fas fa-user-friends"></i> ${result.total_votes}`;
            }
        } catch (error) {
            this.disabled = false;
            this.innerText = 'ناردنی نمرە';
            messageDiv.className = 'rating-message error';
            messageDiv.innerText = 'کێشەیەک لە پەیوەندی هەیە!';
            messageDiv.style.display = 'block';
        }
    });
};
</script>
