        /* ========================================

      /* --- دیزاینی لۆگۆی شاهانە و پڕۆفیشناڵ --- */
        .logo {
            position: relative;
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            /* ڕێگری لە شێوانی لۆگۆ لە ئایفۆن */
            flex-shrink: 0; 
        }

        .logo img {
            height: 60px;
            width: 60px;
            border-radius: 50%;
            object-fit: cover;
            padding: 3px;
            background: var(--bg-card);
            border: 2px solid transparent;
            /* دروستکردنی بۆردەری جوڵاوی بێ وێنە */
            background-image: linear-gradient(var(--bg-card), var(--bg-card)), 
                              conic-gradient(var(--accent-color), var(--accent-light), transparent 80%);
            background-origin: border-box;
            background-clip: content-box, border-box;
            
            animation: spin-border 4s linear infinite, float-logo 3s ease-in-out infinite alternate;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 0 15px rgba(140, 0, 255, 0.3);
        }

        /* جوڵەی سوڕانەوەی ڕەنگەکە بە دەوری لۆگۆدا */
        @keyframes spin-border {
            100% { filter: hue-rotate(360deg); transform: rotate(0deg); }
        }

        /* جوڵەی سەر و خوارێکی زۆر نەرم */
        @keyframes float-logo {
            0% { transform: translateY(0px); }
            100% { transform: translateY(-6px); }
        }

        /* کاریگەری کاتێک ماوسی دەچێتە سەر */
        .logo:hover img {
            transform: scale(1.1) rotate(10deg);
            box-shadow: 0 0 25px var(--accent-color);
            cursor: pointer;
        }

        /* --- ڕێکخستنی زۆر ورد بۆ مۆبایل و ئایفۆن --- */
        @media (max-width: 768px) {
            .logo {
                gap: 8px;
            }
            .logo img {
                height: 45px; /* بچووکتر بۆ ئەوەی جێگەی ببێتەوە */
                width: 45px;
                padding: 2px;
            }
            .logo span {
                font-size: 16px !important;
                letter-spacing: 0.5px;
            }

        /* ئەگەر شاشەکە زۆر بچووک بوو وەک iPhone SE */
        @media (max-width: 380px) {
            .logo span {

            }
        }

        .logo img {

            filter: drop-shadow(0 0 15px rgba(140, 0, 255, 0.6));

        }

            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }

        /* =========================================
           دیزاینی تایبەتی کاردەکان (Moving Border)
           ========================================= */
        .card {
            position: relative;
            background: var(--bg-card);
            border-radius: var(--card-radius);
            aspect-ratio: 2/3;
            cursor: pointer;
            transition: all 0.4s ease;
            /* بۆ ئەوەی بۆردەرە جوڵاوەکە لە دەرەوە دەرنەچێت */
            overflow: hidden;
            z-index: 1;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex; /* بۆ ڕێکخستنی ناوەڕۆک */
            justify-content: center;
            align-items: center;
        }

        /* دروستکردنی بۆردەری جوڵاوی مۆر */
        .card::before {
            content: '';
            position: absolute;
            width: 150%;
            height: 150%;
            background: conic-gradient(transparent, transparent, transparent, #8c00ff);
            animation: border-spin 4s linear infinite;
            z-index: -2;
        }

        /* دروستکردنی بەشی ناوەوەی کاردەکە کە وێنەکەی تێدایە */
        .card::after {
            content: '';
            position: absolute;
            inset: 3px; /* ئەستووری بۆردەرەکە */
            background: var(--bg-card);
            border-radius: calc(var(--card-radius) - 3px);
            z-index: -1;
        }

        .card:hover {
            transform: translateY(-10px) scale(1.02);
            box-shadow: 0 20px 50px rgba(140, 0, 255, 0.3);
        }
        
        /* خێراکردنی جوڵەی بۆردەر کاتێک ماوس دەچێتە سەری */
        .card:hover::before {
            animation-duration: 1.5s;
            background: conic-gradient(transparent, transparent, #00d2ff, #8c00ff); /* ڕەنگی زیاتر */
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: calc(var(--card-radius) - 3px); /* ڕێکخستن لەگەڵ بۆردەر */
            transition: 0.5s;
            z-index: 1; /* هاتنە سەرەوە */
            display: block;
            position: absolute;
            inset: 3px; /* پڕکردنەوەی ناو چوارچێوەکە */
        }

        .card:hover .card-img {
            filter: brightness(0.4); /* تۆخکردنی وێنە زیاتر بۆ دەرکەوتنی نووسینەکان */
        }

        .card-tag {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(140, 0, 255, 0.8);
            backdrop-filter: blur(5px);
            color: #fff;
            padding: 5px 12px;
            border-radius: 8px;
            font-size: 11px;
            font-weight: 800;
            box-shadow: 0 0 10px rgba(140, 0, 255, 0.5);
            z-index: 10;
        }

        /* دیزاینی نوێ بۆ بەشی نووسینی سەر کاردەکان */
.card-overlay {
    position: absolute;
    bottom: 0; 
    left: 0; 
    right: 0;
    /* سێبەرێکی نەرم بۆ ژێر ناوەکە */
    background: linear-gradient(to top, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.3) 60%, transparent 100%);
    padding: 20px 15px;
    
    /* گۆڕینی ئەم بەهایە وادەکات ناوەکە بێتە سەرەوەتر لە دەرەوە */
    transform: translateY(58%); 
    
    opacity: 1;
    transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), background 0.4s;
    z-index: 5;
    border-bottom-left-radius: calc(var(--card-radius) - 3px);
    border-bottom-right-radius: calc(var(--card-radius) - 3px);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
}

/* کاتێک ماوس دەچێتە سەر کاردەکە */
.card:hover .card-overlay {
    transform: translateY(0);
    background: linear-gradient(to top, rgba(0,0,0,0.98) 40%, rgba(0,0,0,0.7) 100%);
}

.card-title {
    font-size: 13px;
    font-weight: 700;
    color: #fff;
    text-align: center; /* ناوەڕاست کرا */
    text-shadow: 0 2px 8px rgba(0,0,0,0.9);
    
    /* سیستمی 2 دێڕ */
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    line-clamp: 2;
    
    overflow: hidden;
    word-wrap: break-word;
    hyphens: auto;
    
    line-height: 1.35;
    max-height: 2.7em;
    margin-bottom: 6px;
    padding: 0 6px;
    
    /* جوانکاری */
    text-align-last: center; /* دێڕی کۆتایی دەچێتە ناوەڕاست */
    
    transition: all 0.3s ease;
}

/* کاتێک hover دەکەیت */
.card:hover .card-title {
    text-shadow: 0 0 12px rgba(140, 0, 255, 0.9),
                 0 2px 8px rgba(0,0,0,0.9);
    transform: scale(1.02);
}

/* بۆ مۆبایل */
@media (max-width: 768px) {
    .card-title {
        font-size: 11.5px;
        line-height: 1.3;
        max-height: 2.6em;
    }
}


/* ژانەرەکە لە دەرەوە بشارەوە و تەنها لە کاتی Hover نیشانی بدە */
.card-genre {
    color: var(--accent-light);
    font-size: 12px;
    font-weight: 600;
    margin-bottom: 8px;
    text-align: right;
    
    opacity: 0; /* شاراوە لە دەرەوە */

}

.card:hover .card-genre {

}

/* کورتە چیرۆکەکە لە دەرەوە بشارەوە و تەنها لە کاتی Hover نیشانی بدە */
.card-desc {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    overflow: hidden;
    -webkit-line-clamp: 2; 
    line-clamp: 2; 
    font-size: 11px;
    color: #cccccc;
    line-height: 1.5;
    text-align: right;
    
    opacity: 0; /* شاراوە لە دەرەوە */
    transition: opacity 0.3s ease;
}

    opacity: 1; /* دەرکەوتن لە کاتی Hover */
}

        /* دیزاینی پڕۆفیشناڵی دوگمەی گەڕانەوە بە بۆردەری جوڵاوی مۆر */
.back-btn {
    position: relative;
    background: rgba(20, 20, 30, 0.8);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: none;
    color: white;
    padding: 14px 35px;
    border-radius: 50px;
    cursor: pointer;
    margin-bottom: 30px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-weight: bold;
    font-size: 15px;
    overflow: hidden;
    z-index: 1;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
}

/* بۆردەری جوڵاوی مۆر - لایەری یەکەم */
.back-btn::before {
    content: '';
    position: absolute;
    width: 150%;
    height: 150%;
    top: -25%;
    left: -25%;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        transparent 60deg,
        #8c00ff 120deg,
        #b366ff 180deg,
        #8c00ff 240deg,
        transparent 300deg,
        transparent 360deg
    );
    animation: rotateBorder 3s linear infinite;

}

.back-btn::after {
    content: '';
    position: absolute;
    inset: 2px;
    background: linear-gradient(135deg, rgba(20, 20, 30, 0.95), rgba(30, 15, 45, 0.9));
    border-radius: 48px;
    z-index: -1;
}

/* ئەنیمەیشنی سوڕانەوە */
@keyframes rotateBorder {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* کاتی Hover - خێراکردنی جوڵەکە و گۆڕانی ڕەنگ */
.back-btn:hover {
    transform: translateY(-3px) scale(1.05);
    box-shadow: 0 12px 35px rgba(140, 0, 255, 0.4);
}

.back-btn:hover::before {
    animation-duration: 1.5s;
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        #00d2ff 90deg,
        #8c00ff 180deg,
        #ff00ff 270deg,
        transparent 360deg
    );
}

/* درەوشانەوەی ئایکۆنەکە */
.back-btn:hover i {
    animation: arrowBounce 0.6s ease-in-out;
}

@keyframes arrowBounce {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(5px); }
}

/* کاتی کلیک کردن */
.back-btn:active {
    transform: translateY(-1px) scale(0.98);

}

            renderEpisodes: function() {

                episodes.forEach((ep, index) => {
                    const btn = document.createElement('button');

                    btn.onclick = () => {
                        this.playEpisode(index, 0); 
                        document.querySelectorAll('#episode-list .action-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');

                    listContainer.appendChild(btn);

            playEpisode: function(epIndex, serverIndex) {
                this.currentEpisodeIndex = epIndex;
                const episode = this.currentMovie.episodes[epIndex];
                
                const serverContainer = document.getElementById('server-list');
                serverContainer.innerHTML = '';

                if(episode.servers && episode.servers.length > 0) {
                    episode.servers.forEach((srv, idx) => {
                        const btn = document.createElement('button');
                        btn.className = `action-btn ${idx === serverIndex ? 'active' : ''}`;
                        btn.innerHTML = `<i class="fas fa-server"></i> ${srv.name}`;
                        
                        btn.onclick = () => {
                            document.getElementById('video-frame').src = srv.link;
                            document.querySelectorAll('#server-list .action-btn').forEach(b => b.classList.remove('active'));
                            btn.classList.add('active');
                        };
                        serverContainer.appendChild(btn);
                    });

                    document.getElementById('video-frame').src = episode.servers[serverIndex].link;
                } else {
                    document.getElementById('video-frame').src = "";
                    serverContainer.innerHTML = '<span style="color:red">هیچ سێرڤەرێک نییە</span>';
                }

           search: function(query) {
    let filtered = this.data;
    
    // یەکەم: فلتەر بەپێی جۆری هەڵبژاردراو (دراما، فیلم، یان هەموویان)
    if (this.currentFilter && this.currentFilter !== 'all') {
        filtered = filtered.filter(i => i.type === this.currentFilter);
    }
    
    // دووەم: فلتەر بەپێی ناوی گەڕاو
    if (query) {
        filtered = filtered.filter(i => i.title.toLowerCase().includes(query.toLowerCase()));
    }
    
    this.renderGrid(filtered);
    if(document.getElementById('player-modal').style.display === 'block') this.goHome();
},
filter: function(type, btnElement) {
    // تۆماری جۆری هەڵبژاردراو
    this.currentFilter = type;
    
    document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
    btnElement.classList.add('active');

    const filterNav = document.getElementById('filter-navbar');
    
    // فلتەری ژانر و ساڵ تەنها بۆ دراما، فیلم، و چینی نیشان بدە
    if (type === 'drama' || type === 'movie' || type === 'chinese') {
        filterNav.style.display = 'flex';
    } else {
        filterNav.style.display = 'none';
    }

    let filtered;
    if(type === 'all') {
        filtered = this.data;
    } else {
        filtered = this.data.filter(i => i.type === type);
    }
    
    filtered.sort((a, b) => b.id - a.id);
    this.renderGrid(filtered);

    // گۆڕینەوەی سەردێڕی بەش
    const sectionHeader = document.querySelector('.section-header');
    
    // ✅ فووتەر: تەنها لە هەمووی پیشان دەدرێت، هێلین-کێڵوا شارەوە دەبێت لە ناڤبارەکانی تر
    const helinFooter = document.querySelector('.helin-footer');
    if (helinFooter) {
        if (type === 'all') {
            helinFooter.classList.remove('hide-credits');
        } else {
            helinFooter.classList.add('hide-credits');
        }
    }

    if (type === 'all') {
        sectionHeader.innerHTML = `
            <i class="fas fa-bolt"></i>
            <span>نوێترین زیادکراوەکان</span>
        `;
    } else if (type === 'drama') {
        sectionHeader.innerHTML = `
            <i class="fas fa-tv"></i>
            <span>دراما</span>
        `;
    } else if (type === 'movie') {
        sectionHeader.innerHTML = `
            <i class="fas fa-film"></i>
            <span>فیلم</span>
        `;
    } else if (type === 'chinese') {
        sectionHeader.innerHTML = `
            <i class="fas fa-dragon"></i>
            <span>چینی</span>
        `;
    }

    if(document.getElementById('player-modal').style.display === 'block') this.goHome();
},

        if (role === 'translator') {
            for (let work of works) {
                if (work.translators) {
                    const found = work.translators.find(t => t.name === personName);
                    if (found) return found.avatar;
                }
            }
        } else if (role === 'technician') {
            return works[0].technician.avatar;
        }
        return 'admin1.png';
    }

        if (role === 'translator') {
            return item.translators && item.translators.some(t => t.name === personName);

            return item.technician && item.technician.name === personName;
        }
        return false;

function toggleFilterMenu() {
    const dropdown = document.getElementById('filter-dropdown');
    const btn = document.querySelector('.filter-toggle-btn');
    dropdown.classList.toggle('show');
    btn.classList.toggle('active');
}

function applyFilters() {
    const genreCheckboxes = document.querySelectorAll('.filter-options input[type="checkbox"]');
    const selectedGenres = [];
    const selectedYears = [];
    
    genreCheckboxes.forEach(checkbox => {
        if (checkbox.checked) {
            const value = checkbox.value;
            if (!isNaN(value)) {
                selectedYears.push(value);
            } else {
                selectedGenres.push(value);
            }
        }
    });
    

    
    let currentType = app.currentFilter || 'all';
    
    // ئەگەر هیچ هەڵبژاردنێک نەبوو تەنها جۆرەکە نیشان بدە
    if (selectedGenres.length === 0 && selectedYears.length === 0) {
        let filtered = currentType === 'all' ? app.data : app.data.filter(item => item.type === currentType);
        app.renderGrid(filtered);
        toggleFilterMenu();
        return;
    }
    
    // دەستپێکردن لە هەموو داتاکان
    let filtered = app.data;
    
    // **یەکەم:** فلتەر بکە بەپێی جۆر (دراما یان فیلم)
    if (currentType !== 'all') {
        filtered = filtered.filter(item => item.type === currentType);
    }
    
    // **دووەم:** فلتەر بکە بەپێی ژانەر (ئەگەر هەڵبژێردراوە)
    if (selectedGenres.length > 0) {
        filtered = filtered.filter(item => {
            return selectedGenres.some(genre => item.genre && item.genre.includes(genre));
        });
    }
    
    // **سێیەم:** فلتەر بکە بەپێی ساڵ (ئەگەر هەڵبژێردراوە)
    if (selectedYears.length > 0) {
        filtered = filtered.filter(item => {
            return selectedYears.some(year => item.title.includes(year));
        });
    }
    
    app.renderGrid(filtered);
    toggleFilterMenu(); // داخستنی مێنیوی فلتەر
}

function clearFilters() {
    const checkboxes = document.querySelectorAll('.filter-options input[type="checkbox"]');
   checkboxes.forEach(cb => cb.checked = false);
    
    let currentType = app.currentFilter || 'all';
    // فلتەرکردن بەپێی جۆرەکە
    let filtered;
    if (currentType === 'all') {
        filtered = app.data;
    } else {
        filtered = app.data.filter(item => item.type === currentType);
    }
    
    app.renderGrid(filtered);
    toggleFilterMenu();
}

    if (section === 'genre') {
        if (genreSection.style.display === 'none') {
            genreSection.style.display = 'block';
            genreBtn.classList.add('active');
        } else {
            genreSection.style.display = 'none';

    if (currentRandomItem) pickRandom();
}

function pickRandom() {
    let pool = app.data;
    if (currentRandomType !== 'all') {
        pool = app.data.filter(d => d.type === currentRandomType);
    }
    if (pool.length === 0) return;

    // دڵنیابوون لەوەی دووبارە هەمان شت نەدەرکەوێت
    let item;
    do {
        item = pool[Math.floor(Math.random() * pool.length)];
    } while (pool.length > 1 && currentRandomItem && item.id === currentRandomItem.id);

    currentRandomItem = item;

    // تایپی نمایش
    const typeMap = { drama: 'دراما', movie: 'فیلم', chinese: 'چینی' };

    document.getElementById('random-img').src = item.image;

    setTimeout(() => app.openPlayer(currentRandomItem), 150);

function quickRandom(type) {
    currentRandomType = type;
    currentRandomItem = null;

    let pool = app.data;
    if (type !== 'all') pool = app.data.filter(d => d.type === type);
    if (pool.length === 0) return;

    const item = pool[Math.floor(Math.random() * pool.length)];
    currentRandomItem = item;

    document.getElementById('modern-sidebar').classList.remove('active');
    document.getElementById('sidebar-trigger').classList.remove('active');

    app.openPlayer(item);
}

    function closeMenuModal() {

    // ========== فانکشنەکانی هەژمار ==========
    function modalCreateAccount() {
        const name = document.getElementById('modal-userName').value;
        const email = document.getElementById('modal-userEmail').value;
        const img = document.getElementById('modal-previewImg').src;
        if (!name || !email) { alert('تکایە خانەکان پڕ بکەرەوە!'); return; }
        localStorage.setItem('userAccount', JSON.stringify({ name, email, img }));
        document.getElementById('modal-auth-form').style.display = 'none';
        document.getElementById('modal-user-profile').style.display = 'block';
        document.getElementById('modal-displayName').innerText = name;
        document.getElementById('modal-displayEmail').innerText = email;
        document.getElementById('modal-displayImg').src = img;
    }

    function modalEditName() {
        const current = document.getElementById('modal-displayName').innerText;
        const newName = prompt('ناوی نوێ بنووسە:', current);
        if (newName) {
            document.getElementById('modal-displayName').innerText = newName;
            const data = JSON.parse(localStorage.getItem('userAccount'));
            data.name = newName;
            localStorage.setItem('userAccount', JSON.stringify(data));
        }
    }

    function modalUpdateImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('modal-displayImg').src = e.target.result;
                const data = JSON.parse(localStorage.getItem('userAccount'));
                data.img = e.target.result;
                localStorage.setItem('userAccount', JSON.stringify(data));
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    function modalDeleteAccount() {
        if (confirm('دڵنیای لە سڕینەوە؟')) {
            localStorage.removeItem('userAccount');
            closeMenuModal();
        }
    }

    // ========== هاوکێشەی bnMenu ==========
    function bnMenu(btn) {
        sidebar.classList.toggle('active');
        trigger.classList.toggle('active');
        if (sidebar.classList.contains('active')) {
            document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        } else {
            document.querySelectorAll('.bn-item').forEach(b => b.classList.remove('active'));
            const first = document.querySelector('.bn-item:first-child');
            if (first) first.classList.add('active');
        }
    }

    // داخستنی مۆداڵ بە ESC
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') closeMenuModal();
    });
</script>

    margin: 30px auto;
    padding: 30px 20px;
    
    /* گرنگە بۆ ئەوەی جوڵەکە لە دەرەوەی بازنەکە دەرنەچێت */
    border-radius: 24px;
    overflow: hidden; 
    
    /* لابردنی بۆردەری کۆن چونکە ئێستا جوڵەکە دەبێتە بۆردەر */
    /* border: 1px solid ... (This is removed/replaced by the animation) */
    
    /* سێبەر بۆ جوانی */
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6),
                0 0 50px rgba(140, 0, 255, 0.15);
                
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    
    /* دڵنیابوونەوە لەوەی نووسینەکان دەکەونە سەرەوە */
    z-index: 1; 
}

/* ::before - بەرپرسیارە لە جوڵەی ڕەنگەکە (لە خوارەوە دەخولێتەوە) */
.rating-wrapper::before {
    content: '';
    position: absolute;
    /* قەبارەکەی گەورەتر دەکەین بۆ ئەوەی لە کاتی خولانەوەدا بۆشایی نەمێنێت */
    width: 200%; 
    height: 200%;
    top: -50%;
    left: -50%;
    
    /* دیزاینی جوڵەکە: لێرە ڕەنگەکان دیاری دەکەیت */
    background: conic-gradient(
        from 0deg,
        transparent 0deg,
        rgba(140, 0, 255, 0) 60deg,  /* دەستپێک */
        rgba(140, 0, 255, 1) 120deg, /* ڕەنگی تێری مۆر */
        rgba(140, 0, 255, 0) 180deg, /* کاڵبوونەوە */
        transparent 360deg
    );
    
    animation: rotateBorder 4s linear infinite; /* خێرایی جوڵەکە */
    z-index: -2; /* دەچێتە ژێر هەموو شتێک */
}

/* ::after - بەرپرسیارە لە دروستکردنی باگراوندە جێگیرەکە */
.rating-wrapper::after {
    content: '';
    position: absolute;
    
    /* ئەم بەشە ئەستووری بۆردەرەکە دیاری دەکات */
    /* ژمارەکە گەورەتر بێت، هێڵە جوڵاوەکە باریکتر دەبێت */
    inset: 2px; 
    
    background: rgba(20, 10, 40, 0.98); /* ڕەنگی سەرەکی باگراوند */
    background: linear-gradient(145deg, rgba(15, 5, 30, 0.98), rgba(25, 10, 45, 0.95));
    
    border-radius: 22px; /* کەمێک کەمتر لە هی باوکەکە بۆ ئەوەی جوان بێت */
    z-index: -1; /* لە سەرووی جوڵەکەوەیە بەڵام لە ژێر نووسینەکە */
}

@keyframes rotateBorder {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
/* سەردێڕ */
.rating-header {
    text-align: center;
    margin-bottom: 25px;
    position: relative;
    z-index: 2;
}

.rating-main-title {
    color: #fff;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    text-shadow: 0 2px 10px rgba(140, 0, 255, 0.5);
    line-height: 1.4;
}

.rating-main-title i {
    color: #ffd700;
    font-size: 22px;
}

.rating-subtitle {
    color: #c499ff;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
}

/* بەشی ئەستێرەکان - دیزاینی گەردوونی جوڵاو */
.rating-stars-section {
    /* باگراوندێکی تاریکی شەفاف بە دیزاینی شووشەیی */
    background: rgba(20, 20, 30, 0.6);
    backdrop-filter: blur(12px); /* تارکردنی پشتەوە (Blur) - زۆر مۆدێرنە */
    -webkit-backdrop-filter: blur(12px);
    
    padding: 30px 15px;
    border-radius: 20px;
    margin-bottom: 25px;
    
    /* سنوورێکی (Border) ناسک کە ڕەنگدانەوەی هەیە */
    border: 1px solid rgba(255, 255, 255, 0.1);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), 
                inset 0 0 20px rgba(255, 255, 255, 0.05); /* ڕووناکی ناوەوە */
    
    position: relative;
    z-index: 2;
    text-align: center;
    overflow: hidden; /* بۆ ئەوەی ڕووناکییە جوڵاوەکان نەچنە دەرەوە */
}

/* دروستکردنی شەپۆلی ڕووناکی کە بە پاشبنەمادا تێدەپەڕێت */
.rating-stars-section::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle, rgba(112, 0, 255, 0.1) 0%, transparent 60%);
    animation: rotateGlow 10s linear infinite; /* ڕووناکییەکە دەسوڕێتەوە */
    z-index: -1;
}

.stars-container {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 15px;
    direction: rtl; /* ئێستا لە ڕاستەوە دەستپێدەکات */
}

.star {
    font-size: 42px;
    color: #4a4a6a;
    cursor: pointer;
    transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s;
    user-select: none;
    
    /* ڕێککردنی کێشەی ئەندرۆید */
    display: inline-flex;
    align-items: center;
    justify-content: center;
    vertical-align: middle;
    width: 48px;
    height: 48px;
    -webkit-tap-highlight-color: transparent;
}
/* ئەمەش لە ژێری زیاد بکە */
.star svg {
    width: 100%;
    height: 100%;
    pointer-events: none;
    fill: currentColor;
}

/* بۆ ئەوەی هەموو ئەستێرەکان بەیەکەوە نەجوڵێن، کاتی دەستپێکیان جیا دەکەینەوە */
.star:nth-child(1) { animation-delay: 0s; }
.star:nth-child(2) { animation-delay: 0.2s; }
.star:nth-child(3) { animation-delay: 0.4s; }
.star:nth-child(4) { animation-delay: 0.6s; }
.star:nth-child(5) { animation-delay: 0.8s; }

.star.active {
    color: #ffd700;
    /* گەورەبوون و درەوشانەوەی زێڕین */
    transform: scale(1.15) translateY(-5px); 
    text-shadow: 0 0 20px rgba(255, 215, 0, 0.6), 
                 0 0 40px rgba(255, 215, 0, 0.3);
    
    /* جوڵەی لێدانی دڵ بۆ ئەستێرە دیاریکراوەکان */
    animation: starPulse 2s infinite alternate; 
}

.selection-hint {
    color: #a8a8cf;
    font-size: 15px;
    font-weight: 600;
    min-height: 24px;
    margin-top: 15px;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    transition: color 0.3s ease;
}

.selection-hint.active {
    color: #ffd700;
    text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
}

/* --- ئەنیمەیشنەکان (Keyframes) --- */

/* جوڵەی ڕووناکی باگراوند */
@keyframes rotateGlow {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}

/* جوڵەی مەلەکردن (Floating) - ئەستێرەکان دێن و دەچن */
@keyframes floatingStars {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); } /* ٦ پیکسڵ دەچێتە سەرەوە */
}

/* جوڵەی ترپە (Pulse) بۆ ئەستێرە ئەکتیڤەکان */
@keyframes starPulse {
    0% { transform: scale(1.15) translateY(-5px); text-shadow: 0 0 20px rgba(255, 215, 0, 0.6); }
    100% { transform: scale(1.25) translateY(-5px); text-shadow: 0 0 35px rgba(255, 215, 0, 0.9); }
}

/* میدیا کوێری بۆ مۆبایل */
@media (max-width: 480px) {
    .star {
        font-size: 38px; /* کەمێک بچووکتر بۆ مۆبایل */
    }
    .rating-stars-section {
        padding: 20px 10px;
    }
}

/* دوگمەی ناردن - دیزاینی مۆری جوڵاو (با) */
.submit-rating-btn {
    -webkit-appearance: none; /* زۆر گرنگە بۆ ئەندرۆید */
    appearance: none;
    width: 100%;
    
    /* دروستکردنی شەپۆلی رەنگەکان (مۆری تۆخ، مۆری ڕوون، و کەمێک پەمەیی بۆ جوانی) */
    background: linear-gradient(
        120deg, 
        #5b00c4, 
        #8800ff, 
        #b54eff, 
        #8800ff, 
        #5b00c4
    );
    background-size: 300% 300%; /* گرنگە: باگراوندەکە گەورە دەکات بۆ ئەوەی بجوڵێت */
    
    color: white;
    border: none;
    padding: 15px;
    border-radius: 14px;
    font-size: 16px;
    font-weight: 800;
    position: relative;
    z-index: 2;
    outline: none;
    cursor: pointer;
    
    /* جوڵەی باگراوند و سێبەر بەیەکەوە */
    animation: windFlow 4s ease-in-out infinite;
    transition: transform 0.2s;
}

/* ئەمە بەرپرسە لە جوڵاندنی ڕەنگەکە و سێبەری لاکانی */
@keyframes windFlow {
    0% {
        background-position: 0% 50%;
        box-shadow: 0 8px 20px rgba(91, 0, 196, 0.4);
    }
    50% {
        background-position: 100% 50%;
        box-shadow: 0 10px 30px rgba(181, 78, 255, 0.6); /* سێبەرەکە گەورە دەبێت */
    }
    100% {
        background-position: 0% 50%;
        box-shadow: 0 8px 20px rgba(91, 0, 196, 0.4);
    }
}

.submit-rating-btn:active {
    transform: scale(0.96);
    /* کاتێک دەست دەنێیت کەمێک سێبەرەکە کەم دەکاتەوە */
    box-shadow: 0 5px 15px rgba(112, 0, 255, 0.4); 
}

.submit-rating-btn:disabled {
    background: #3e3e4e;
    color: #aaa;
    box-shadow: none;
    opacity: 0.7;
    cursor: not-allowed;
    animation: none; /* جوڵەی نامێنێت ئەگەر ئیش نەکات */
}

/* بەشی ئەنجامەکان */
.rating-results {
    display: flex;
    flex-direction: row;
    gap: 15px;
    margin-top: 30px;
    z-index: 2;
    position: relative;
}

.result-card {
    flex: 1;
    background: rgba(255, 255, 255, 0.03);
    padding: 15px 10px;
    border-radius: 14px;
    text-align: center;
    border: 1px solid rgba(140, 0, 255, 0.1);
}

.result-label {
    color: #b366ff;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    margin-bottom: 5px;
}

.result-value {
    color: #fff;
    font-size: 24px;
    font-weight: 900;
}

/* پەیامەکان */
.rating-message {
    margin-top: 20px;
    padding: 12px;
    border-radius: 10px;
    font-size: 13px;
    text-align: center;
    display: none;
    font-weight: bold;
}

.rating-message.success {
    background: rgba(46, 204, 113, 0.15);
    color: #2ecc71;
    border: 1px solid rgba(46, 204, 113, 0.3);
}

.rating-message.error {
    background: rgba(231, 76, 60, 0.15);
    color: #e74c3c;
    border: 1px solid rgba(231, 76, 60, 0.3);
}

/* ڕێکخستن بۆ مۆبایلی زۆر بچوک */
@media (max-width: 380px) {
    .rating-wrapper { padding: 20px 15px; }
    .star { font-size: 36px; gap: 8px; }
    .rating-main-title { font-size: 18px; }
}
</style>

<script>
// سکریپتەکە وەک خۆی، تەنها کەمێک چاکسازیم تێدا کرد بۆ خێرایی
const RATING_API_URL = 'https://script.google.com/macros/s/AKfycbyGN4f965k_b3zSkK1D7FivI4VZ-9QrqU7ETjC3a6NPKYtXa3xeiHB13gNfeOAefXUK/exec';

async function getUserIP() {
    const saved = localStorage.getItem('user_unique_id');
    if (saved) return saved;
    const tempID = `user_${Math.random().toString(36).substr(2, 15)}`;
    localStorage.setItem('user_unique_id', tempID);
    // هەوڵی هێنان لە باکگراوند
    fetch('https://api.ipify.org?format=json').then(res => res.json()).then(data => localStorage.setItem('user_unique_id', data.ip)).catch(()=>{});
    return tempID;
}

const originalOpenPlayer = app.openPlayer;
app.openPlayer = async function(item) {
    await originalOpenPlayer.call(this, item);
    setTimeout(() => this.renderRatingSection(item), 100); // دواخستنێکی زۆر کەم بۆ دڵنیابوون لە ڕێندەر
};

app.renderRatingSection = async function(item) {
    const oldSection = document.querySelector('.rating-wrapper');
    if (oldSection) oldSection.remove();
    
    const serverContainer = document.getElementById('server-list').parentElement;
    const hasVoted = localStorage.getItem(`voted_${item.id}`) === 'true';
    const userRating = localStorage.getItem(`user_rating_${item.id}`) || '؟';

    let html = `
        <div class="rating-wrapper fade-in">
            <div class="rating-header">
                <div class="rating-main-title">
                    <i class="fas fa-award"></i>
                    نمرە بدە بەم ${item.type === 'drama' ? 'دراما' : 'فیلمە'}
                </div>
                <div class="rating-subtitle">
                    ${hasVoted ? 'سوپاس بۆ بەشداریکردنت!' : 'پێشبینی خۆت تۆمار بکە'}
                </div>
            </div>
            
           <div class="rating-stars-section">
    <div class="stars-container" id="stars-${item.id}">
        ${[1,2,3,4,5].map(n => `
            <span class="star ${hasVoted ? 'disabled' : ''}" data-rating="${n}">
                <svg viewBox="0 0 24 24">
                    <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z"/>
                </svg>
            </span>
        `).join('')}
    </div>
    <div class="selection-hint" id="hint-${item.id}">
        ${hasVoted ? 'نمرەی تۆ: ' + userRating : 'ئەستێرەیەک هەڵبژێرە'}
    </div>
</div>
            
            <button class="submit-rating-btn" id="submit-rating-${item.id}" ${hasVoted ? 'disabled' : ''}>
                ${hasVoted ? '✓ نمرەکەت گەیشت' : 'ناردنی نمرە'}
            </button>
            
            <div id="rating-message-${item.id}" class="rating-message"></div>
            
            <div class="rating-results">
                <div class="result-card">
                    <div class="result-label">تێکڕا</div>
                    <div class="result-value rating-average" id="avg-${item.id}">-.-</div>
                </div>
                <div class="result-card">
                    <div class="result-label">دەنگەکان</div>
                    <div class="result-value" id="votes-${item.id}">0</div>
                </div>
            </div>
        </div>
    `;
    
    serverContainer.insertAdjacentHTML('afterend', html);
    this.setupRatingEvents(item, hasVoted);
    this.fetchLiveRatings(item.id);
};

app.fetchLiveRatings = async function(movieId) {
    try {
        const response = await fetch(`${RATING_API_URL}?movie_id=${movieId}`);
        const data = await response.json();
        const avgEl = document.getElementById(`avg-${movieId}`);
        const votesEl = document.getElementById(`votes-${movieId}`);
        if (avgEl) avgEl.innerText = data.average || '0.0';
        if (votesEl) votesEl.innerHTML = `<i class="fas fa-user-friends"></i> ${data.total_votes || 0}`;
    } catch (error) { console.log("Error fetching ratings"); }
};

app.setupRatingEvents = function(item, hasVoted) {
    let selectedRating = 0;
    const stars = document.querySelectorAll(`#stars-${item.id} .star`);
    const hint = document.getElementById(`hint-${item.id}`);
    const submitBtn = document.getElementById(`submit-rating-${item.id}`);
    const messageDiv = document.getElementById(`rating-message-${item.id}`);

    const ratingTexts = { 1: 'خراپ 😞', 2: 'مامناوەند 😐', 3: 'باش 🙂', 4: 'زۆر باش 😊', 5: 'نایاب! 🤩' };

    stars.forEach(star => {
        // بەکارهێنانی 'click' بۆ مۆبایل باشترە لە hover
        star.addEventListener('click', function() {
            if (hasVoted) return;
            selectedRating = parseInt(this.dataset.rating);
            
            // لابردنی کلاسەکان و زیادکردنەوەیان
            stars.forEach(s => {
                const sVal = parseInt(s.dataset.rating);
                if (sVal <= selectedRating) {
                    s.classList.add('active');
                    s.style.color = '#ffd700';
                } else {
                    s.classList.remove('active');
                    s.style.color = '#3a3a50';
                }
            });
            
            hint.innerText = ratingTexts[selectedRating];
            hint.classList.add('active');
        });
    });

    submitBtn.addEventListener('click', async function() {
        if (hasVoted || selectedRating === 0) {
            if(selectedRating === 0) {
                hint.style.color = '#e74c3c';
                setTimeout(() => hint.style.color = '#9b59b6', 1000);
            }
            return;
        }

        this.disabled = true;
        this.innerText = 'چاوەڕوانبە...';

        try {
            const userIP = await getUserIP();
            const res = await fetch(RATING_API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({ movie_id: item.id, user_ip: userIP, rating: selectedRating })
            });

            const result = await res.json();
            if (result.status === 'success' || result.status === 'already_voted') {
                localStorage.setItem(`voted_${item.id}`, 'true');
                localStorage.setItem(`user_rating_${item.id}`, selectedRating);
                
                this.innerText = '✓ نمرەکەت گەیشت';
                messageDiv.className = 'rating-message success';
                messageDiv.innerText = 'سوپاس! دەنگەکەت بە سەرکەوتوویی تۆمارکرا.';
                messageDiv.style.display = 'block';
                
                document.getElementById(`avg-${item.id}`).innerText = result.average;
                document.getElementById(`votes-${item.id}`).innerHTML = `<i class="fas fa-user-friends"></i> ${result.total_votes}`;
            }
        } catch (error) {
            this.disabled = false;
            this.innerText = 'ناردنی نمرە';
            messageDiv.className = 'rating-message error';
            messageDiv.innerText = 'کێشەیەک لە پەیوەندی هەیە!';
            messageDiv.style.display = 'block';
        }
    });
};
</script>
